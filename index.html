<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Advisor — Cykelkläder efter väder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

<style>
:root {
  --k-ink:         #111111;
  --k-bg:          #F7F7F5;
  --k-white:       #FFFFFF;
  --k-mid:         #666662;
  --k-faint:       #E2E2DF;
  --k-orange:      #D96B1F;
  --k-orange-tt:   rgba(217,107,31,0.06);
  --k-sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --k-serif: 'Playfair Display', Georgia, serif;
  --k-mono: ui-monospace, 'SF Mono', 'Courier New', monospace;
  --k-radius: 10px;
  --k-radius-sm: 7px;
  --k-border: 0.5px solid var(--k-faint);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--k-bg);
  color: var(--k-ink);
  font-family: var(--k-sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; min-height: 0; overflow: hidden; }

/* ── Header ── */
header {
  flex-shrink: 0;
  height: 50px;
  background: var(--k-white);
  border-bottom: var(--k-border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 12px;
  z-index: 1001;
}

.brand { font-family: var(--k-serif); font-style: italic; font-size: 18px; color: var(--k-ink); flex-shrink: 0; letter-spacing: -0.01em; white-space: nowrap; }
.brand .slash { color: var(--k-orange); font-style: normal; }
.h-rule { width: 1px; height: 16px; background: var(--k-faint); flex-shrink: 0; }

.loc-bar { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
.loc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--k-ink); }
.loc-coords { font-family: var(--k-mono); font-size: 10px; color: var(--k-mid); white-space: nowrap; flex-shrink: 0; }

/* ── Header toggles ── */
.h-toggles { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.tog-grp { display: flex; border: var(--k-border); border-radius: var(--k-radius-sm); overflow: hidden; background: var(--k-bg); }
.tog-grp button {
  border: none; background: transparent; color: var(--k-mid);
  font-family: var(--k-mono); font-size: 10px; letter-spacing: 0.04em;
  padding: 4px 8px; cursor: pointer; transition: all 0.12s; line-height: 1;
}
.tog-grp button:not(:last-child) { border-right: var(--k-border); }
.tog-grp button.active { background: var(--k-ink); color: var(--k-white); }
.tog-grp button:not(.active):hover { background: var(--k-faint); color: var(--k-ink); }

/* ── Status ── */
.status-pill {
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--k-mono); font-size: 10px; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 100px; border: var(--k-border);
  color: var(--k-mid); background: var(--k-bg); transition: all 0.2s; white-space: nowrap;
}
.status-pill.loading { border-color: var(--k-orange); color: var(--k-orange); background: var(--k-orange-tt); }
.status-pill.ready   { border-color: #5a9e6f; color: #3d7a52; background: rgba(90,158,111,0.06); }
.status-pill.error   { border-color: #c05050; color: #a03838; background: rgba(192,80,80,0.06); }

/* ── Mobile city banner ── */
.mob-loc {
  display: none;
  background: var(--k-white);
  border-bottom: var(--k-border);
  padding: 9px 16px;
  font-size: 13px; font-weight: 500; color: var(--k-ink);
  align-items: center; gap: 7px; flex-shrink: 0;
}

/* ── Body ── */
.body-row { display: flex; flex: 1 1 0; overflow: hidden; min-height: 0; }

/* ── Panels ── */
.panel {
  background: var(--k-white);
  display: flex; flex-direction: column;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--k-faint) transparent;
}
.panel::-webkit-scrollbar { width: 3px; }
.panel::-webkit-scrollbar-thumb { background: var(--k-faint); }

.panel-left  { width: 336px; flex-shrink: 0; border-right: var(--k-border); }
.panel-right { width: 344px; flex-shrink: 0; border-left: var(--k-border); }

.p-sec { padding: 15px 18px; border-bottom: var(--k-border); }
.p-sec:last-child { border-bottom: none; }

.sec-label { font-family: var(--k-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--k-mid); margin-bottom: 11px; }

/* ── Map ── */
.map-wrap { position: relative; flex: 1 1 0; min-width: 0; min-height: 0; overflow: hidden; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

.map-hint {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  z-index: 500; background: var(--k-white); border: var(--k-border); border-radius: 100px;
  padding: 6px 14px; font-size: 12px; color: var(--k-mid);
  pointer-events: none; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 10px rgba(17,17,17,0.06);
}

/* Leaflet overrides */
.leaflet-popup-content-wrapper { background: var(--k-white); border: var(--k-border); border-radius: var(--k-radius) !important; color: var(--k-ink); font-family: var(--k-sans); font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.leaflet-popup-tip { background: var(--k-white); }
.leaflet-popup-content { margin: 10px 14px; }
.leaflet-control-zoom a { background: var(--k-white) !important; color: var(--k-ink) !important; border-color: var(--k-faint) !important; }
.leaflet-control-zoom a:hover { background: var(--k-bg) !important; }
.leaflet-control-attribution { background: rgba(247,247,245,0.8) !important; color: var(--k-mid) !important; font-size: 10px !important; }
.leaflet-control-attribution a { color: var(--k-mid) !important; }

/* ── Weather grid ── */
.wx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.wx-cell { background: var(--k-bg); border: var(--k-border); border-radius: var(--k-radius-sm); padding: 9px 11px; }
.wx-cell .wl { font-family: var(--k-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-mid); margin-bottom: 3px; }
.wx-cell .wv { font-family: var(--k-mono); font-size: 19px; color: var(--k-ink); line-height: 1; }
.wx-cell .wu { font-size: 11px; color: var(--k-mid); }
.wx-cell.wx-hi { border-color: rgba(217,107,31,0.3); background: var(--k-orange-tt); }
.wx-cell.wx-hi .wv { color: var(--k-orange); }
.wx-desc { margin-top: 9px; font-size: 12px; color: var(--k-mid); }

/* ── Sliders ── */
.sl-block { margin-bottom: 13px; }
.sl-block:last-child { margin-bottom: 0; }
.sl-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.sl-hd .sl-name { font-size: 12px; font-weight: 500; color: var(--k-ink); }
.sl-hd .sl-val  { font-family: var(--k-mono); font-size: 12px; color: var(--k-orange); }

input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: var(--k-faint); border-radius: 1px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--k-orange); border: 2px solid var(--k-white); box-shadow: 0 0 0 1px var(--k-faint); cursor: pointer; }

/* ── Intensity ── */
.int-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 7px; }
.int-btn { border: var(--k-border); background: var(--k-bg); color: var(--k-mid); padding: 7px 4px; font-family: var(--k-sans); font-size: 12px; font-weight: 500; border-radius: var(--k-radius-sm); cursor: pointer; text-align: center; transition: all 0.12s; }
.int-btn:hover { border-color: var(--k-orange); color: var(--k-orange); }
.int-btn.active { background: var(--k-orange-tt); border-color: rgba(217,107,31,0.35); color: var(--k-orange); }

/* ── Effective temp ── */
.eff-card { background: var(--k-bg); border: var(--k-border); border-radius: var(--k-radius); padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.eff-label { font-family: var(--k-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-mid); margin-bottom: 6px; }
.eff-breakdown { font-family: var(--k-mono); font-size: 10px; color: var(--k-mid); line-height: 1.9; }
.eff-number { font-family: var(--k-mono); font-size: 40px; font-weight: 300; line-height: 1; text-align: right; flex-shrink: 0; letter-spacing: -0.03em; }

/* ── Callout ── */
.callout { background: var(--k-orange-tt); border-left: 2px solid var(--k-orange); border-radius: 0 var(--k-radius) var(--k-radius) 0; padding: 9px 13px 9px 11px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
.callout.danger { background: rgba(192,80,80,0.05); border-left-color: #c05050; }
.callout p { font-size: 12px; line-height: 1.55; color: var(--k-ink); margin: 0; }
.callout.danger p { color: #8a3030; }

/* ── Kit rows ── */
.kit-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: var(--k-border); }
.kit-row:last-child { border-bottom: none; }
.kit-ph { font-size: 15px; color: var(--k-mid); flex-shrink: 0; margin-top: 1px; width: 18px; text-align: center; }
.kit-cat { font-family: var(--k-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-mid); margin-bottom: 2px; }
.kit-name { font-size: 13px; font-weight: 500; color: var(--k-ink); line-height: 1.3; }
.kit-note { font-size: 11px; color: var(--k-mid); margin-top: 2px; line-height: 1.4; }

/* ── Forecast chip ── */
.fc-now    { font-family: var(--k-mono); font-size: 12px; color: var(--k-orange); }
.fc-future { font-family: var(--k-mono); font-size: 12px; color: var(--k-ink); }

/* ── Loading / empty ── */
.empty { color: var(--k-mid); font-size: 12px; padding: 8px 0; font-style: italic; }
.loading-row { display: flex; align-items: center; gap: 7px; color: var(--k-mid); font-size: 12px; padding: 6px 0; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid var(--k-faint); border-top-color: var(--k-orange); border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pulse marker ── */
@keyframes pulse-ring { 0% { transform:scale(0.5); opacity:0.7; } 100% { transform:scale(2.4); opacity:0; } }
.pulse-marker { position:relative; width:14px; height:14px; }
.pulse-marker .core { position:absolute; inset:0; border-radius:50%; background:var(--k-orange); border:2px solid var(--k-white); box-shadow:0 1px 4px rgba(217,107,31,0.4); }
.pulse-marker .ring { position:absolute; inset:0; border-radius:50%; background:var(--k-orange); animation:pulse-ring 2s ease-out infinite; }

/* ── Responsive ── */
@media (max-width: 820px) {
  .panel-left  { width: 220px; }
  .panel-right { width: 210px; }
  .loc-coords  { display: none; }
}

@media (max-width: 640px) {
  /* City banner above map on mobile */
  .mob-loc { display: flex; }
  .loc-name, .loc-coords, .h-rule { display: none; }
  .tog-grp button { padding: 4px 6px; font-size: 9px; }

  /* Scroll layout */
  html, body { height: auto; overflow: auto; }
  #app { height: auto; min-height: 100vh; overflow: visible; }
  .body-row { flex-direction: column; overflow: visible; height: auto; min-height: 0; }

  /* Map: fixed pixel height — Leaflet needs a concrete number */
  .map-wrap { height: 150px; min-height: 150px; flex: none; order: -1; overflow: hidden; position: relative; }
  #map { position: absolute; top: 0; left: 0; width: 100%; height: 150px; }

  /* Panels: full width, natural height */
  .panel { width: 100% !important; overflow-y: visible; height: auto; border-left: none !important; border-right: none !important; border-bottom: var(--k-border); }
  .panel-right { border-bottom: none; }
}

/* ── Share button ── */
.share-btn-panel {
  width: 100%; border: var(--k-border); background: var(--k-bg); color: var(--k-mid);
  font-family: var(--k-sans); font-size: 12px; font-weight: 500;
  padding: 8px 12px; border-radius: var(--k-radius-sm); cursor: pointer;
  transition: all 0.12s; text-align: center; display: flex;
  align-items: center; justify-content: center; gap: 7px;
}
.share-btn-panel:hover { border-color: var(--k-orange); color: var(--k-orange); }

/* ── Own-ride link ── */
.own-ride-link {
  font-family: var(--k-mono); font-size: 10px; color: var(--k-mid);
  text-decoration: none; flex-shrink: 0; white-space: nowrap;
  letter-spacing: 0.04em; align-items: center;
}
.own-ride-link:hover { color: var(--k-ink); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(17,17,17,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-card {
  background: var(--k-white); border: var(--k-border);
  border-radius: var(--k-radius); width: 100%; max-width: 420px;
  box-shadow: 0 8px 32px rgba(17,17,17,0.12);
}
.modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 14px; border-bottom: var(--k-border);
}
.modal-title {
  font-family: var(--k-serif); font-style: italic; font-size: 17px;
  color: var(--k-ink);
}
.modal-close {
  border: none; background: none; color: var(--k-mid); font-size: 18px;
  cursor: pointer; line-height: 1; padding: 2px 6px;
}
.modal-close:hover { color: var(--k-ink); }
.modal-body { padding: 18px 20px 20px; }
.form-row { margin-bottom: 14px; }
.form-row label {
  display: block; font-family: var(--k-mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-mid);
  margin-bottom: 6px;
}
.form-row input[type=text],
.form-row input[type=date],
.form-row input[type=time] {
  width: 100%; background: var(--k-bg); border: var(--k-border);
  border-radius: var(--k-radius-sm); padding: 8px 11px;
  font-size: 13px; font-family: var(--k-sans); color: var(--k-ink); outline: none;
  -webkit-appearance: none;
}
.form-row input[type=text]:focus,
.form-row input[type=date]:focus,
.form-row input[type=time]:focus { border-color: var(--k-orange); }
.form-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-summary {
  font-family: var(--k-mono); font-size: 11px; color: var(--k-mid);
  margin-bottom: 16px; padding: 8px 11px;
  background: var(--k-bg); border: var(--k-border); border-radius: var(--k-radius-sm);
}
.btn-generate {
  width: 100%; background: var(--k-ink); color: var(--k-white);
  border: none; border-radius: var(--k-radius-sm); padding: 9px 18px;
  font-family: var(--k-sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.12s; margin-bottom: 12px;
}
.btn-generate:hover { opacity: 0.85; }
.share-url-row { display: flex; gap: 8px; align-items: center; }
.share-url-row input {
  flex: 1; background: var(--k-bg); border: var(--k-border);
  border-radius: var(--k-radius-sm); padding: 7px 10px;
  font-family: var(--k-mono); font-size: 11px; color: var(--k-mid); outline: none;
}
.btn-copy {
  border: var(--k-border); background: var(--k-bg); color: var(--k-mid);
  padding: 7px 12px; border-radius: var(--k-radius-sm); cursor: pointer;
  font-family: var(--k-mono); font-size: 10px; letter-spacing: 0.04em;
  transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
}
.btn-copy:hover { background: var(--k-faint); color: var(--k-ink); }
.btn-copy.copied { border-color: #5a9e6f; color: #3d7a52; background: rgba(90,158,111,0.06); }

/* ── Image modal additions ── */
.img-preview-wrap {
  width: 100%; max-height: 360px; overflow-y: auto;
  border: var(--k-border); border-radius: var(--k-radius-sm);
  background: var(--k-bg); margin-bottom: 14px;
}
#kitCanvas { width: 100%; height: auto; display: block; }
.img-actions { display: flex; gap: 8px; }
.img-actions .btn-generate { flex: 1; margin-bottom: 0; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-generate-ghost {
  flex: 1; background: transparent; color: var(--k-ink);
  border: var(--k-border); border-radius: var(--k-radius-sm); padding: 9px 18px;
  font-family: var(--k-sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.12s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-generate-ghost:hover { background: var(--k-faint); }

/* ── Affiliate section ── */
.aff-divider { border: none; border-top: var(--k-border); margin: 0 0 14px; }
.aff-row {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; padding: 8px 0;
  border-bottom: var(--k-border); transition: opacity 0.12s;
}
.aff-row:last-of-type { border-bottom: none; }
.aff-row:hover { opacity: 0.65; }
.aff-store { font-weight: 500; font-size: 13px; color: var(--k-ink); flex-shrink: 0; }
.aff-cat { font-size: 12px; color: var(--k-mid); flex: 1; }
.aff-icon { font-size: 14px; color: var(--k-mid); flex-shrink: 0; }
.aff-disclaimer { font-size: 11px; color: var(--k-mid); font-style: italic; margin-top: 10px; }

/* ── Ad slot ── */
#adSlot {
  width: 300px; height: 250px; margin: 0 auto;
  background: var(--k-bg); border: var(--k-border);
  border-radius: var(--k-radius);
  display: flex; align-items: center; justify-content: center;
}
.ad-placeholder-label { font-family: var(--k-mono); font-size: 10px; color: var(--k-mid); letter-spacing: 0.1em; }
.ad-label { font-size: 10px; color: var(--k-mid); text-align: center; margin-top: 6px; }

/* ── Kit expand / custom kit ── */
.kit-expand-btn {
  background: none; border: none; padding: 0 0 14px;
  font-family: var(--k-mono); font-size: 11px; color: var(--k-mid);
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  letter-spacing: 0.04em; transition: color 0.12s;
}
.kit-expand-btn:hover { color: var(--k-ink); }
.kit-custom-section { border-top: var(--k-border); padding-top: 14px; }
.kit-update-btn {
  width: 100%; background: var(--k-bg); color: var(--k-ink);
  border: var(--k-border); border-radius: var(--k-radius-sm); padding: 7px 14px;
  font-family: var(--k-sans); font-size: 12px; cursor: pointer;
  transition: background 0.12s; margin-bottom: 14px;
}
.kit-update-btn:hover { background: var(--k-faint); }
.kit-tag {
  font-family: var(--k-mono); font-size: 10px;
  background: var(--k-orange-tt);
  border: 0.5px solid rgba(217,107,31,0.2);
  color: var(--k-orange); border-radius: 100px;
  padding: 2px 7px; display: inline-block;
  margin-left: 6px; vertical-align: middle;
}

/* ── Shared mode ── */
.is-shared input[type=range] { opacity: 0.45; pointer-events: none; cursor: default; }
.is-shared .int-btn { opacity: 0.45; pointer-events: none; cursor: default; }
.is-shared .int-btn:hover { border-color: var(--k-faint) !important; color: var(--k-mid) !important; background: var(--k-bg) !important; }
.is-shared #fcBlock { display: none !important; }

@media (max-width: 480px) {
  .form-row-2col { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">Kit<span class="slash">/</span>Advisor</div>
    <div class="h-rule"></div>
    <div class="loc-bar">
      <i class="ph ph-map-pin" style="font-size:13px;color:var(--k-mid);flex-shrink:0;"></i>
      <span class="loc-name" id="locName"></span>
      <span class="loc-coords" id="locCoords"></span>
    </div>
    <div class="h-toggles">
      <div class="tog-grp" id="langTog">
        <button class="tog active" data-v="sv">SV</button>
        <button class="tog" data-v="en">EN</button>
      </div>
      <div class="tog-grp" id="tempTog">
        <button class="tog active" data-v="C">°C</button>
        <button class="tog" data-v="F">°F</button>
      </div>
      <div class="tog-grp" id="windTog">
        <button class="tog active" data-v="kmh">km/h</button>

function fmtTemp(c, dec=1) {

}
function fmtEffTemp(c) {
  const v = S.tempUnit==='F' ? Math.round((c*9/5)+32) : Math.round(c);
  return (v>0?'+':'')+v+'°';
}
function fmtWind(kmh) {

  if(marker) map.removeLayer(marker);
  marker = L.marker([lat,lng],{icon:pulseIcon}).addTo(map);
}

// ─── SELECT LOCATION ─────────────────────────────────────
async function selectLocation(lat, lng) {
  S.lat=lat; S.lng=lng; S.fcOffset=0;
  document.getElementById('fcSlider').value=0;
  placeMarker(lat,lng);
  document.getElementById('mapHint').style.display='none';
  if (!S.isShared) {
    document.getElementById('locCoords').textContent=`${lat.toFixed(4)}° N  ${lng.toFixed(4)}° E`;
  }
  setStatus('loading');
  document.getElementById('wxArea').innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  document.getElementById('analysisArea').innerHTML='<div class="empty"></div>';
  document.getElementById('kitArea').innerHTML='<div class="empty"></div>';
  try {
    const days = S.isShared ? 16 : 2;
    const [weather,name] = await Promise.all([fetchWeather(lat,lng,days), reverseGeocode(lat,lng)]);
    S.wxLive=weather; S.wx=weather;
    if (!S.isShared) S.locName=name;
    setLocName(S.isShared ? (S.shareName||name) : name);
    if (S.isShared) {
      applySharedDateOffset();
      applySharedMode();
    } else {
      document.getElementById('fcBlock').style.display='block';
      document.getElementById('shareBtnSec').style.display='block';
    }
    renderAll();
    setStatus('ready');
    updateFcLabel();
  } catch(e) {
    console.error(e);
    document.getElementById('wxArea').innerHTML=`<div class="callout danger">${MANICULA_D}<p>Nätverksfel — kontrollera anslutningen.</p></div>`;
    setStatus('error');
  }
}

function setLocName(name) {
  document.getElementById('locName').textContent=name;

}

  el.className='status-pill '+state;
  el.textContent=t('status')[state]||state;
}

// ─── WEATHER FETCH ────────────────────────────────────────
async function fetchWeather(lat, lng, days=2) {
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation,relative_humidity_2m,weather_code&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation,relative_humidity_2m,weather_code&wind_speed_unit=kmh&timezone=auto&forecast_days=${days}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('API');
  const d=await r.json();
  const c=d.current;
  const nowIdx=d.hourly.time.findIndex(t=>t===c.time);
  S.hourly={
    times:d.hourly.time, temp:d.hourly.temperature_2m,
    wind:d.hourly.wind_speed_10m, gusts:d.hourly.wind_gusts_10m,
    precip:d.hourly.precipitation, humidity:d.hourly.relative_humidity_2m,
    wcode:d.hourly.weather_code, nowIdx:nowIdx>=0?nowIdx:0,
  };
  return { temp:c.temperature_2m, wind:c.wind_speed_10m, gusts:c.wind_gusts_10m, precip:c.precipitation, humidity:c.relative_humidity_2m, wcode:c.weather_code };
}

function wxAtOffset(off) {
  if(!S.hourly||off===0) return S.wxLive;
  const idx=Math.min(S.hourly.nowIdx+off, S.hourly.temp.length-1);
  return { temp:S.hourly.temp[idx], wind:S.hourly.wind[idx], gusts:S.hourly.gusts[idx], precip:S.hourly.precip[idx], humidity:S.hourly.humidity[idx], wcode:S.hourly.wcode[idx] };
}

// ─── REVERSE GEOCODE ──────────────────────────────────────
async function reverseGeocode(lat, lng) {
  try {
    const accept = S.lang==='en' ? 'en' : 'sv,da,nb';
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':accept}});
    const d=await r.json();
    const a=d.address||{};
    const city=a.city||a.town||a.village||a.municipality||a.county||(S.lang==='sv'?'Okänd plats':'Unknown location');
    return a.country?`${city}, ${a.country}`:city;
  } catch { return S.lang==='sv'?'Plats vald':'Location selected'; }
}

// ─── WEATHER DESCRIPTION ─────────────────────────────────
function wDesc(code) {
  const m=t('wDesc');
  const keys=Object.keys(m).map(Number).sort((a,b)=>a-b);
  for(let i=keys.length-1;i>=0;i--) if(code>=keys[i]) return m[keys[i]];
  return m[0];
}
function wIcon(c) {
  if(c<=1)  return '☀';
  if(c<=3)  return '⛅';
  if(c<=48) return '〇';
  if(c<=67) return '◉';
  if(c<=77) return '❄';
  if(c<=82) return '◉';
  return '⚡';
}

// ─── RENDER WEATHER ───────────────────────────────────────
function renderWeather(w) {
  const cx=t('wxCells');
  document.getElementById('wxArea').innerHTML=`
    <div class="wx-grid">
      <div class="wx-cell wx-hi">
        <div class="wl">${cx.temp}</div>
        <div class="wv">${fmtTemp(w.temp)}</div>
      </div>
      <div class="wx-cell">
        <div class="wl">${cx.wind}</div>
        <div class="wv">${fmtWind(w.wind)}</div>
      </div>
      <div class="wx-cell">
        <div class="wl">${cx.humidity}</div>
        <div class="wv">${Math.round(w.humidity)}<span class="wu"> %</span></div>
      </div>
      <div class="wx-cell">
        <div class="wl">${cx.gusts}</div>
        <div class="wv">${fmtWind(w.gusts)}</div>
      </div>
    </div>
    <div class="wx-desc">${wIcon(w.wcode)} ${wDesc(w.wcode)}${w.precip>0?` · ${w.precip.toFixed(1)} mm`:''}</div>
  `;
}

// ─── FORMULA ─────────────────────────────────────────────
function windChill(T, V) {
  if(T>=10||V<4.8) return T;
  return 13.12+0.6215*T-11.37*Math.pow(V,0.16)+0.3965*T*Math.pow(V,0.16);
}
function calcEff(w) {
  const speed=speedKmh(), dur=parseFloat(document.getElementById('durSlider').value);
  const wc=windChill(w.temp, w.wind+speed);
  const effort={easy:4,mod:7,hard:11}[S.intensity];
  const durP=dur>3?-2:dur>1.5?-1:0;
  const humP=w.humidity>85?-2:0;
  return { eff:Math.round((wc+effort+durP+humP)*10)/10, wc:Math.round(wc*10)/10, effort,durP,humP };
}

// ─── RENDER ANALYSIS ─────────────────────────────────────
function renderAnalysis() {
  if(!S.wx) return;
  const {eff,wc,effort,durP,humP}=calcEff(S.wx);
  let color='#3d7a52';
  if(eff<13) color='#2e6ea6';
  if(eff<6)  color='#5a48b4';
  if(eff<0)  color='#8040b0';
  if(eff>24) color='#b83c3c';

  let bd=`${t('windChill')}: ${fmtTemp(wc)}<br>${t('effort')}: +${effort}°`;
  if(durP<0) bd+=`<br>${t('durPen')}: ${durP}°`;
  if(humP<0) bd+=`<br>${t('humPen')}: ${humP}°`;

  let horizonHtml = '';
  if (S.isShared && S.shareDate) {
    const daysAway = (new Date(S.shareDate) - new Date()) / (1000*3600*24);
    if (daysAway < -0.5) {
      horizonHtml = `<div class="callout">${MANICULA}<p>${t('ridePassed')}</p></div>`;
    } else if (daysAway > 10) {
      horizonHtml = `<div class="callout">${MANICULA}<p>${t('forecastUnavailable')(fmtDate(new Date(S.shareDate)))}</p></div>`;
    } else if (daysAway > 3) {
      horizonHtml = `<div class="callout">${MANICULA}<p>${t('forecastUncertain')}</p></div>`;
    }
  }

  document.getElementById('analysisArea').innerHTML=`
    ${horizonHtml}
    <div class="eff-card">
      <div>
        <div class="eff-label">${t('effTemp')}</div>
        <div class="eff-breakdown">${bd}</div>
      </div>
      <div class="eff-number" style="color:${color}">${fmtEffTemp(eff)}</div>
    </div>
  `;
  renderKit(eff);
}

function makeManicula(color) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="28" height="28" style="flex-shrink:0;margin-top:1px;color:${color}"><style>.m0{fill:currentColor}</style><path class="m0" d="${MANICULA_PATH}"/></svg>`;
}

const MANICULA   = makeManicula('#D96B1F');
const MANICULA_D = makeManicula('#c05050');

// ─── RENDER KIT ───────────────────────────────────────────
function krow(ph, catKey, kitKey) {
  const [name,note]=tkit(kitKey);
  return `<div class="kit-row"><i class="ph ${ph} kit-ph"></i><div><div class="kit-cat">${t(catKey)}</div><div class="kit-name">${name}</div>${note?`<div class="kit-note">${note}</div>`:''}</div></div>`;
}

function renderKit(eff) {
  const w=S.wx, dur=parseFloat(document.getElementById('durSlider').value);
  const isRain=w.precip>0.3||w.wcode>=51;
  const heavyRain=w.wcode>=65||w.precip>2;
  let rows='', callouts='';

  if(eff>=22) {
    rows+=krow('ph-t-shirt','upper','jersey_short');
    rows+=krow('ph-pants','lower','bib_shorts');
  } else if(eff>=17) {
    rows+=krow('ph-t-shirt','upper','jersey_arm');
    rows+=krow('ph-pants','lower','bib_shorts');
    rows+=krow('ph-hand','hands','gloves_light');
  } else if(eff>=12) {
    rows+=krow('ph-t-shirt','upper','jersey_long');
    rows+=krow('ph-pants','lower','bib_shorts_k');
    rows+=krow('ph-hand','hands','gloves_thin');
    rows+=krow('ph-ear','head','ear_warmer');
  } else if(eff>=7) {
    rows+=krow('ph-t-shirt','upper','jersey_thermo');
    rows+=krow('ph-pants','lower','bibtights');
    rows+=krow('ph-hand','hands','gloves_winter');
    rows+=krow('ph-ear','head','ear_band');
  } else if(eff>=2) {
    rows+=krow('ph-coat-hanger','upper','jacket_winter');
    rows+=krow('ph-pants','lower','bibtights_w');
    rows+=krow('ph-hand','hands','gloves_heavy');
    rows+=krow('ph-beanie','head','hat');
    rows+=krow('ph-sneaker','feet','shoe_cover');
  } else {
    rows+=krow('ph-coat-hanger','upper','jacket_double');
    rows+=krow('ph-pants','lower','bibtights_dbl');
    rows+=krow('ph-hand','hands','gloves_extreme');
    rows+=krow('ph-beanie','head','balaclava');
    rows+=krow('ph-sneaker','feet','shoe_winter');
    callouts+=`<div class="callout danger">${MANICULA_D}<p>${talert('extreme')}</p></div>`;
  }

  if(isRain) {
    rows+=krow('ph-cloud-rain','rainprot','rain_jacket');
    rows+=krow('ph-eyeglasses','eyes','glasses');
    if(heavyRain) {
      rows+=krow('ph-sneaker','feet','waterproof');
      callouts+=`<div class="callout">${MANICULA}<p>${talert('heavyRain')}</p></div>`;
    } else {
      callouts+=`<div class="callout">${MANICULA}<p>${talert('rain')}</p></div>`;
    }
  }

  if(dur>3) {
    rows+=krow('ph-backpack','pack','vest');
    callouts+=`<div class="callout">${MANICULA}<p>${talert('longRide')}</p></div>`;
  } else if(dur>1.5) {
    callouts+=`<div class="callout">${MANICULA}<p>${talert('startCold')}</p></div>`;
  }

  if(w.gusts>50) callouts+=`<div class="callout">${MANICULA}<p>${talert('gusts',Math.round(w.gusts))}</p></div>`;

  document.getElementById('kitArea').innerHTML=callouts+rows;

  const showAff = !S.isShared || S.showAff;
  const affSec  = document.getElementById('affSec');
  if (showAff) {
    renderAffiliateLinks(eff, isRain);
    document.getElementById('lblAff').textContent        = t('affTitle');
    document.getElementById('affDisclaimer').textContent = t('affDisclaimer');
    affSec.style.display = 'block';
  } else {
    affSec.style.display = 'none';
  }
}

// ─── SHARED MODE ─────────────────────────────────────────
function initFromUrl() {
  const p = new URLSearchParams(window.location.search);
  if (!p.has('lat') || !p.has('lng')) return false;
  S.isShared  = true;
  S.showAff   = p.has('aff');
  S.shareName = p.get('name') || '';
  S.shareDate = p.get('date') || '';
  S.lat       = parseFloat(p.get('lat'));
  S.lng       = parseFloat(p.get('lng'));
  S.locName   = decodeURIComponent(p.get('loc') || '');
  S.intensity = ['easy','mod','hard'].includes(p.get('int')) ? p.get('int') : 'easy';
  S.customKit = {
    upper: p.get('ku')  || '',
    lower: p.get('kl')  || '',
    hands: p.get('kh')  || '',
    head:  p.get('khe') || '',
    feet:  p.get('kf')  || '',
    rain:  p.get('kr')  || '',
  };
  const dur   = parseFloat(p.get('dur') || '2');
  const speed = parseInt(p.get('speed') || '28');
  document.getElementById('durSlider').value   = dur;
  document.getElementById('durLabel').textContent = dur.toFixed(1)+' h';
  document.getElementById('speedSlider').value = speed;
  document.getElementById('speedLabel').textContent = speed+' km/h';
  document.querySelectorAll('.int-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.int === S.intensity)
  );
  return true;
}

function applySharedDateOffset() {
  if (!S.shareDate || !S.hourly) return;
  const targetStr = S.shareDate.substring(0, 16);
  let idx = S.hourly.times.findIndex(ts => ts.startsWith(targetStr));
  if (idx < 0) {
    const target = new Date(S.shareDate).getTime();
    let minDiff = Infinity;
    S.hourly.times.forEach((ts, i) => {
      const diff = Math.abs(new Date(ts).getTime() - target);
      if (diff < minDiff) { minDiff = diff; idx = i; }
    });
  }
  if (idx >= 0) {
    const offset = idx - S.hourly.nowIdx;
    S.fcOffset = Math.max(0, offset);
    document.getElementById('fcSlider').value = S.fcOffset;
    S.wx = wxAtOffset(S.fcOffset);
  }
}

function applySharedMode() {
  document.getElementById('app').classList.add('is-shared');
  map.off('click');
  document.getElementById('shareBtnSec').style.display = 'none';
  const ownLink = document.getElementById('ownRideLink');
  ownLink.href = CONFIG.baseUrl || (window.location.origin + window.location.pathname);
  ownLink.style.display = 'flex';
  if (S.shareDate) {
    document.getElementById('locCoords').textContent = fmtSharedDate();
  }
}

function fmtDate(d) {
  return d.toLocaleDateString(S.lang==='sv' ? 'sv-SE' : 'en-GB', { day:'numeric', month:'long' });
}

function fmtSharedDate() {
  if (!S.shareDate) return '';
  const d = new Date(S.shareDate);
  return d.toLocaleString(S.lang==='sv' ? 'sv-SE' : 'en-GB', {
    weekday:'short', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit',
  });
}

// ─── SHARE MODAL ─────────────────────────────────────────
function openShareModal() {
  if (!S.lat) return;
  const now = new Date();
  document.getElementById('shareDateInput').value = now.toISOString().substring(0, 10);
  document.getElementById('shareTimeInput').value = now.toTimeString().substring(0, 5);
  document.getElementById('shareNameInput').value = '';
  document.getElementById('shareUrlRow').style.display = 'none';
  updateModalSummary();
  document.getElementById('shareModal').style.display = 'flex';
}

function closeShareModal() {
  document.getElementById('shareModal').style.display = 'none';
}

function updateModalSummary() {
  const dur   = parseFloat(document.getElementById('durSlider').value);
  const speed = parseInt(document.getElementById('speedSlider').value);
  document.getElementById('formSummary').textContent =
    `${dur.toFixed(1)} h · ${speed} km/h · ${t(S.intensity)}`;
}

function generateShareUrl() {
  readCustomKit();
  const name  = document.getElementById('shareNameInput').value.trim();
  const date  = document.getElementById('shareDateInput').value;
  const time  = document.getElementById('shareTimeInput').value || '08:00';
  const dur   = document.getElementById('durSlider').value;
  const speed = document.getElementById('speedSlider').value;
  const base  = CONFIG.baseUrl || (window.location.origin + window.location.pathname);
  const p = new URLSearchParams({
    name, date:`${date}T${time}`,
    lat:S.lat.toFixed(4), lng:S.lng.toFixed(4),
    dur, speed, int:S.intensity, loc:S.locName, aff:'1',
  });
  if (S.customKit.upper) p.set('ku',  S.customKit.upper);
  if (S.customKit.lower) p.set('kl',  S.customKit.lower);
  if (S.customKit.hands) p.set('kh',  S.customKit.hands);
  if (S.customKit.head)  p.set('khe', S.customKit.head);
  if (S.customKit.feet)  p.set('kf',  S.customKit.feet);
  if (S.customKit.rain)  p.set('kr',  S.customKit.rain);
  document.getElementById('shareUrlInput').value = `${base}?${p.toString()}`;
  document.getElementById('shareUrlRow').style.display = 'flex';
}

function copyShareUrl() {
  const input = document.getElementById('shareUrlInput');
  const btn   = document.getElementById('copyBtn');
  const doFallback = () => { input.select(); document.execCommand('copy'); };
  const onCopied = () => {
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('copyLink'); btn.classList.remove('copied'); }, 2000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(input.value).then(onCopied).catch(doFallback);
  } else { doFallback(); onCopied(); }
}

function makeTag(text) {
  if (!text || text.length <= 8) return '';
  const words = text.trim().split(/\s+/);
  if (words.length < 2) return '';
  return words.map(w => w[0]).join('').toUpperCase();
}

// ─── KIT IMAGE ───────────────────────────────────────────
function collectKitItems(eff, w) {
  const dur = parseFloat(document.getElementById('durSlider').value);
  const isRain = w.precip > 0.3 || w.wcode >= 51;
  const heavyRain = w.wcode >= 65 || w.precip > 2;
  const items = [];
  const add = (cat, key) => {
    const [name] = tkit(key);
    const catKey = cat === 'rainprot' ? 'rain' : cat;
    items.push({ cat: t(cat), name, catKey });
  };

  if (eff >= 22) {
    add('upper','jersey_short'); add('lower','bib_shorts');
  } else if (eff >= 17) {
    add('upper','jersey_arm'); add('lower','bib_shorts'); add('hands','gloves_light');
  } else if (eff >= 12) {
    add('upper','jersey_long'); add('lower','bib_shorts_k'); add('hands','gloves_thin'); add('head','ear_warmer');
  } else if (eff >= 7) {
    add('upper','jersey_thermo'); add('lower','bibtights'); add('hands','gloves_winter'); add('head','ear_band');
  } else if (eff >= 2) {
    add('upper','jacket_winter'); add('lower','bibtights_w'); add('hands','gloves_heavy'); add('head','hat'); add('feet','shoe_cover');
  } else {
    add('upper','jacket_double'); add('lower','bibtights_dbl'); add('hands','gloves_extreme'); add('head','balaclava'); add('feet','shoe_winter');
  }
  if (isRain) {
    add('rainprot','rain_jacket'); add('eyes','glasses');
    if (heavyRain) add('feet','waterproof');
  }
  if (dur > 3) add('pack','vest');
  return items;
}

async function generateKitImage() {
  await document.fonts.load('italic 400 80px "Playfair Display"');
  const canvas  = document.getElementById('kitCanvas');
  const ctx     = canvas.getContext('2d');
  const W = 1080, H = 1920, m = 80;
  const isDark  = S.imgTheme === 'neg';

  ctx.clearRect(0, 0, W, H);
  if (isDark) { ctx.fillStyle = '#111111'; ctx.fillRect(0, 0, W, H); }

  const ink  = isDark ? '#F0F0EE' : '#111111';
  const mid  = isDark ? '#888884' : '#666662';
  const div  = isDark ? '#2A2A28' : '#E2E2DF';
  const mono = '"Courier New", Courier, monospace';
  const sans = 'Arial, Helvetica, sans-serif';
  const seri = '"Playfair Display", Georgia, serif';

  // y always = top of current block.
  // Baseline for a given font size ≈ top + fontSize * 0.78
  const bl = (top, size) => top + size * 0.78;

  const hline = (top) => {
    ctx.save(); ctx.strokeStyle = div; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(m, top); ctx.lineTo(W - m, top); ctx.stroke();
    ctx.restore();
  };

  let y = 80;

  // ── Manicula (80×80)
  ctx.save();
  ctx.translate(m, y);
  ctx.scale(80/1000, 80/1000);
  ctx.fillStyle = ink;
  ctx.fill(new Path2D(MANICULA_PATH));
  ctx.restore();

  // ── Brand — right-aligned, mid-height of manicula
  ctx.font = `400 26px ${mono}`; ctx.fillStyle = mid; ctx.textAlign = 'right';
  ctx.fillText('Kit/Advisor', W - m, y + 50);
  ctx.textAlign = 'left';
  y += 80 + 52; // bottom of manicula + gap → 212

  // ── Location name (Playfair italic, 68px)
  const locSize = 68;
  ctx.font = `italic 400 ${locSize}px ${seri}`; ctx.fillStyle = ink;
  ctx.fillText(S.locName || '', m, bl(y, locSize), W - m * 2);
  y += locSize * 1.3; // full line-height → 212 + 88 = 300

  // ── Ride name if shared
  if (S.shareName) {
    const rnSize = 40;
    ctx.font = `italic 400 ${rnSize}px ${seri}`; ctx.fillStyle = ink;
    ctx.fillText(S.shareName, m, bl(y, rnSize), W - m * 2);
    y += rnSize * 1.3 + 8; // → 300 + 60 = 360
  }
  y += 16; // gap before meta

  // ── Meta (30px sans)
  const metaSize = 30;
  ctx.font = `400 ${metaSize}px ${sans}`; ctx.fillStyle = mid;
  const dur = parseFloat(document.getElementById('durSlider').value);
  const parts = [];
  if (S.shareDate) {
    parts.push(new Date(S.shareDate).toLocaleString(
      S.lang === 'sv' ? 'sv-SE' : 'en-GB',
      { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }
    ));
  }
  parts.push(`${dur.toFixed(1)} h · ${speedKmh()} km/h · ${t(S.intensity)}`);
  ctx.fillText(parts.join('  ·  '), m, bl(y, metaSize), W - m * 2);
  y += metaSize * 1.3 + 52; // → ~414

  // ── Divider 1
  hline(y); y += 64;

  // ── "Feels like" label (22px mono caps)
  const lblSize = 22;
  ctx.font = `400 ${lblSize}px ${mono}`; ctx.fillStyle = mid;
  ctx.fillText(t('effTemp').toUpperCase(), m, bl(y, lblSize));
  y += lblSize * 1.3 + 16; // → ~507

  // ── Effective temp (150px mono)
  const effSize = 150;
  const { eff } = calcEff(S.wx);
  ctx.font = `400 ${effSize}px ${mono}`; ctx.fillStyle = ink;
  ctx.fillText(fmtEffTemp(eff), m, bl(y, effSize));
  y += effSize * 1.2 + 36; // → ~723

  // ── Weather icon + description + temp (44px sans)
  const wxSize = 44;
  ctx.font = `400 ${wxSize}px ${sans}`; ctx.fillStyle = mid;
  ctx.fillText(`${wIcon(S.wx.wcode)}  ${wDesc(S.wx.wcode)}  ·  ${fmtTemp(S.wx.temp)}`, m, bl(y, wxSize), W - m * 2);
  y += wxSize * 1.3 + 64; // → ~821

  // ── Divider 2
  hline(y); y += 60;

  // ── Kit items
  readCustomKit();
  const items = collectKitItems(eff, S.wx);
  const catSize  = 20;
  const nameSize = 36;
  const tagSize  = 20;
  for (const item of items) {
    ctx.font = `400 ${catSize}px ${mono}`; ctx.fillStyle = mid;
    ctx.fillText(item.cat.toUpperCase(), m, bl(y, catSize));
    y += catSize * 1.3 + 10;

    const custom      = S.customKit[item.catKey] || '';
    const displayName = custom || item.name;
    const tag         = custom ? makeTag(custom) : '';

    ctx.font = `400 ${nameSize}px ${sans}`; ctx.fillStyle = ink;
    const nameMaxW = tag ? W - m * 2 - 130 : W - m * 2;
    ctx.fillText(displayName, m, bl(y, nameSize), nameMaxW);
    if (tag) {
      ctx.font = `400 ${tagSize}px ${mono}`; ctx.fillStyle = mid;
      ctx.fillText(`[${tag}]`, m + nameMaxW + 16, bl(y, tagSize));
    }
    y += nameSize * 1.3 + 28;
  }

  // ── Footer
  hline(H - 80);
  ctx.font = `400 22px ${mono}`; ctx.fillStyle = mid; ctx.textAlign = 'center';
  ctx.fillText('herrkantarell.github.io/kit-advisor', W / 2, H - 44);
  ctx.textAlign = 'left';
}

async function openImgModal() {
  if (!S.wx) return;
  // show rain field only when rain is expected
  const isRain = S.wx.precip > 0.3 || S.wx.wcode >= 51;
  document.getElementById('ckRainRow').style.display = isRain ? 'block' : 'none';
  // pre-fill inputs from state (populated by initFromUrl in shared mode)
  populateKitInputs();
  // reset expand state
  document.getElementById('kitCustomSection').style.display = 'none';
  document.getElementById('kitExpandIcon').textContent = '+';
  document.getElementById('imgModal').style.display = 'flex';
  const copyBtn = document.getElementById('copyImgBtn');
  const dlBtn   = document.getElementById('downloadImgBtn');
  copyBtn.textContent = t('rendering');
  copyBtn.disabled = true;
  dlBtn.disabled   = true;
  await generateKitImage();
  copyBtn.disabled = false;
  dlBtn.disabled   = false;
  copyBtn.innerHTML = `<i class="ph ph-copy" style="font-size:14px;"></i>${t('copyImage')}`;
  dlBtn.innerHTML   = `<i class="ph ph-download-simple" style="font-size:14px;"></i>${t('downloadImage')}`;
  const hasClipboard = window.isSecureContext && navigator.clipboard && typeof ClipboardItem !== 'undefined';
  copyBtn.style.display = hasClipboard ? 'flex' : 'none';
}

async function reRenderKitImage() {
  const btn = document.getElementById('kitUpdateBtn');
  btn.disabled = true;
  await generateKitImage();
  btn.disabled = false;
}

function closeImgModal() {
  document.getElementById('imgModal').style.display = 'none';
}

function copyKitImage() {
  const canvas = document.getElementById('kitCanvas');
  const btn = document.getElementById('copyImgBtn');
  canvas.toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      btn.innerHTML = `<i class="ph ph-check" style="font-size:14px;"></i>${t('copied')}`;
      setTimeout(() => {
        btn.innerHTML = `<i class="ph ph-copy" style="font-size:14px;"></i>${t('copyImage')}`;
      }, 2000);
    } catch(e) { console.error('clipboard write failed', e); }
  });
}

function downloadKitImage() {
  const canvas = document.getElementById('kitCanvas');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kit-${(S.locName || 'ride').replace(/[^a-z0-9]/gi, '-').toLowerCase()}.png`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

function getAffiliateLinks(eff, isRain) {
  const links = [];
  if (isRain) links.push(AFFILIATE.rain[S.lang]);
  if (links.length < 2) {
    if (eff < 7)       links.push(AFFILIATE.winter[S.lang]);
    else if (eff <= 15) links.push(AFFILIATE.midseason[S.lang]);
    else               links.push(AFFILIATE.summer[S.lang]);
  }
  return links.slice(0, 2);
}

function renderAffiliateLinks(eff, isRain) {
  const links = getAffiliateLinks(eff, isRain);
  document.getElementById('affArea').innerHTML = links.map(l =>
    `<a class="aff-row" href="${l.url}" target="_blank" rel="noopener noreferrer">
      <span class="aff-store">${l.store}</span>
      <span class="aff-cat">${l.cat}</span>
      <i class="ph ph-arrow-square-out aff-icon"></i>
    </a>`
  ).join('');
}

// ─── TOGGLE BINDINGS ─────────────────────────────────────
function bindToggle(id, key, cb) {
  document.getElementById(id).querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', function(){
      document.getElementById(id).querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      S[key]=this.dataset.v;
      cb();
    });
  });
}
bindToggle('langTog','lang', updateLabels);
bindToggle('tempTog','tempUnit', ()=>{ if(S.wx) renderAll(); });
bindToggle('windTog','windUnit', ()=>{
  // Speed slider always stays in km/h — only weather wind cells update
  if(S.wx) renderAll();
});
bindToggle('imgThemeTog','imgTheme', async ()=>{ if(S.wx) await generateKitImage(); });

// ─── SLIDER BINDINGS ─────────────────────────────────────
document.getElementById('durSlider').addEventListener('input', function(){
  document.getElementById('durLabel').textContent=parseFloat(this.value).toFixed(1)+' h';
  if(S.wx) renderAnalysis();
});
document.getElementById('speedSlider').addEventListener('input', function(){
  document.getElementById('speedLabel').textContent=parseInt(this.value)+' km/h';
  if(S.wx) renderAnalysis();
});
document.getElementById('fcSlider').addEventListener('input', function(){
  S.fcOffset=parseInt(this.value);
  S.wx=wxAtOffset(S.fcOffset);
  updateFcLabel();
  renderAll();
});
document.querySelectorAll('.int-btn').forEach(btn=>{
  btn.addEventListener('click', function(){
    document.querySelectorAll('.int-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    S.intensity=this.dataset.int;
    if(S.wx) renderAnalysis();
  });
});

} else {

}
